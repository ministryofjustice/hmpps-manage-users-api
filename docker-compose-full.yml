version: '3.1'
services:
  auth-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: auth-db
    restart: always
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_USER=admin
      - POSTGRES_DB=auth-db

  hmpps-auth:
    image: ghcr.io/ministryofjustice/hmpps-auth:latest
    networks:
      - hmpps
    container_name: hmpps-auth
    depends_on:
      - auth-db
      - wiremock
    ports:
      - '9090:8080'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/auth/health']
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev,delius,local-postgres,manage-users-api,nomis
      - DELIUS_ENDPOINT_URL=http://wiremock:8080/delius
      - MANAGE_USERS_API_ENDPOINT_URL=http://hmpps-manage-users-api:8080
      - NOMIS_ENDPOINT_URL=http://nomis-user-roles-api:8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://auth-db:5432/auth-db
      - HOSTNAME=hmpps-auth
      - APPLICATION_AUTHENTICATION_UI_ALLOWLIST=0.0.0.0/0

  manage-users-db:
    image: postgres:18
    networks:
      - hmpps
    container_name: manage-users-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=admin_password
      - POSTGRES_USER=admin
      - POSTGRES_DB=manage-users-db

  localstack:
    image: localstack/localstack:4
    networks:
      - hmpps
    container_name: localstack
    ports:
      - "4566-4597:4566-4597"
      - 8999:8080
    environment:
      - SERVICES=sqs
      - DEBUG=${DEBUG- }
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/init:/etc/localstack/init"
  
  wiremock:
    image: wiremock/wiremock:latest
    networks:
      - hmpps
    command:
      - --local-response-templating
    ports:
      - "8091:8080"
    volumes:
      - ./wiremock:/home/wiremock

  hmpps-external-users-api:
    image: ghcr.io/ministryofjustice/hmpps-external-users-api:latest
    networks:
      - hmpps
    container_name: hmpps-external-users-api
    depends_on:
      - hmpps-auth
    ports:
      - "8088:8080"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health/ping" ]
    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=dev,local-postgres
      - API_BASE_URL_OAUTH=http://hmpps-auth:8080/auth
      - SPRING_R2DBC_URL=r2dbc:postgresql://auth-db:5432/auth-db?sslmode=prefer
      - SPRING_FLYWAY_URL=jdbc:postgresql://auth-db:5432/auth-db?sslmode=prefer
